name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ===========================================================
  # Backend: Lint + Tests
  # ===========================================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout ruff httpx

      - name: Lint with Ruff
        run: ruff check app/ --output-format=github

      - name: Run tests
        env:
          OPENAI_API_KEY: "sk-test-key-minimum-20-chars-for-ci"
          QDRANT_URL: "http://localhost:6333"
          REDIS_URL: "redis://localhost:6379/1"
          ATLASSIAN_CLIENT_ID: "test-client-id"
          ATLASSIAN_CLIENT_SECRET: "test-client-secret-all-lower-case"
          JWT_SECRET_KEY: "test-jwt-secret-key-minimum-32-characters"
          APP_ENV: "development"
          ALLOWED_TENANTS: ""
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          # NOTE: path is relative to repo root, not working-directory
          file: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ===========================================================
  # Backend: Docker Build (verify image builds cleanly)
  # ===========================================================
  backend-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: jira-cortex:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================
  # Forge App: Lint & Type-Check
  # ===========================================================
  forge-lint:
    name: Forge App Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./forge-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./forge-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit --strict || true

      - name: Lint
        run: npm run lint --if-present

  # ===========================================================
  # Security: Trivy + detect-secrets
  # (non-blocking in CI, blocking in deploy.yml for production)
  # ===========================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — scan Python dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./backend/requirements.txt"
          format: "table"
          severity: "CRITICAL,HIGH"
          # Non-blocking in CI: developers see the report, deploy.yml gate blocks production
          exit-code: "0"
          ignore-unfixed: true

      - name: detect-secrets — check for leaked credentials
        run: |
          pip install detect-secrets
          detect-secrets scan \
            --baseline .secrets.baseline \
            backend/ \
            --exclude-files "tests/.*" \
            --exclude-files ".*\.pyc$" \
            || echo "::warning ::detect-secrets found potential issues — review above"
