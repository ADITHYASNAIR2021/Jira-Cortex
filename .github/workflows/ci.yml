name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Lint with Ruff
        run: ruff check app/ --output-format=github

      - name: Run tests
        env:
          OPENAI_API_KEY: "sk-test-key-minimum-20-chars"
          QDRANT_URL: "http://localhost:6333"
          REDIS_URL: "redis://localhost:6379/0"
          ATLASSIAN_CLIENT_ID: "test-client-id"
          ATLASSIAN_CLIENT_SECRET: "test-secret-key-minimum-10-chars"
          JWT_SECRET_KEY: "test-secret-key-minimum-32-characters-here"
          APP_ENV: "development"
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  # Backend Docker Build
  backend-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: jira-cortex:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Forge App Lint
  forge-lint:
    name: Forge App Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./forge-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./forge-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./backend"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
