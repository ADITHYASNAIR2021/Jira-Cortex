# Kubernetes Secrets Template
# DO NOT commit actual secrets to version control!
# Use: kubectl create secret generic jira-cortex-secrets --from-env-file=secrets.env

apiVersion: v1
kind: Secret
metadata:
  name: jira-cortex-secrets
  labels:
    app: jira-cortex
type: Opaque
stringData:
  # OpenAI API Key - REQUIRED
  OPENAI_API_KEY: "sk-your-openai-api-key"

  # Atlassian OAuth credentials
  ATLASSIAN_CLIENT_ID: "your-atlassian-client-id"
  ATLASSIAN_CLIENT_SECRET: "your-atlassian-client-secret"

  # JWT signing key (generate with: openssl rand -base64 32)
  JWT_SECRET_KEY: "your-jwt-secret-key-minimum-32-chars"

  # Database URL for billing (PostgreSQL)
  DATABASE_URL: "postgresql://user:password@postgres:5432/cortex_billing"

  # Allowed tenants (comma-separated cloud IDs)
  ALLOWED_TENANTS: "your-tenant-cloud-id-1,your-tenant-cloud-id-2"

  # Stripe Payment Integration (Financial Fortress)
  STRIPE_SECRET_KEY: "sk_live_your_stripe_secret_key"
  STRIPE_WEBHOOK_SECRET: "whsec_your_webhook_signing_secret"
  STRIPE_PLATFORM_PRICE_ID: "price_your_subscription_price_id"
