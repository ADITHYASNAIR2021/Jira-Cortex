apiVersion: v1
kind: ConfigMap
metadata:
  name: jira-cortex-config
  labels:
    app: jira-cortex
data:
  # Application settings
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_LEVEL: "info"

  # Service URLs (update for your cluster)
  QDRANT_URL: "http://qdrant.jira-cortex.svc.cluster.local:6333"
  REDIS_URL: "redis://redis.jira-cortex.svc.cluster.local:6379/0"

  # CORS (add your domains)
  CORS_ORIGINS: "https://jiracortex.io,https://*.atlassian.net"

  # Rate limiting
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"

  # Vector store
  QDRANT_COLLECTION: "jira_issues"

  # Embeddings
  OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
  OPENAI_CHAT_MODEL: "gpt-4o-mini"

  # Query settings
  MAX_CHUNKS_PER_QUERY: "10"

  # Usage tracking
  ENABLE_USAGE_TRACKING: "true"
