[pytest]
# Run all tests as async automatically (no @pytest.mark.asyncio needed per-test)
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show local variables on test failure
log_cli = true
log_cli_level = WARNING

# Treat warnings as errors for key categories
filterwarnings =
    error::DeprecationWarning:app.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:google.*
